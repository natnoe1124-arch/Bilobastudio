<script>
    // Initialiser EmailJS
    emailjs.init('6I0xqrp11MLKVrAbI'); // Remplacez par votre clé publique EmailJS

    const form = document.getElementById('deleteForm');
    const successMessage = document.getElementById('successMessage');
    const successEmail = document.getElementById('successEmail');
    const errorMessage = document.getElementById('errorMessage');
    const errorDetail = document.getElementById('errorDetail');
    const submitBtn = document.getElementById('submitBtn');

    // Afficher le message de succès dès que l'utilisateur clique sur le bouton
    submitBtn.addEventListener('click', (e) => {
        const email = document.getElementById('email').value.trim();
        if (email) {
            successEmail.textContent = email;
            successMessage.style.display = 'block';
        }
    });

    // Gestion de l'envoi EmailJS
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const username = document.getElementById('username').value.trim();
        const confirmed = document.getElementById('confirm').checked;

        // Réinitialiser les messages d'erreur
        errorMessage.style.display = 'none';

        if (!email || !username || !confirmed) {
            errorDetail.textContent = 'Veuillez remplir tous les champs et confirmer votre demande.';
            errorMessage.style.display = 'block';
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            errorDetail.textContent = 'Veuillez entrer une adresse email valide.';
            errorMessage.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Envoi en cours...';

        try {
            const response = await emailjs.send('service_Bilobastudio', 'template_mtzqx0d', {
                user_email: email,
                user_username: username
            });

            if (response.status === 200) {
                // L'email est envoyé avec succès
                form.reset();
                document.getElementById('confirm').checked = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Supprimer mon compte';
            } else {
                throw new Error('Erreur lors de l\'envoi');
            }
        } catch (error) {
            console.error('Erreur:', error);
            errorDetail.textContent = 'Impossible d\'envoyer la demande. Veuillez réessayer plus tard.';
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Supprimer mon compte';
        }
    });

    function goBack() {
        window.history.back();
    }
</script>
